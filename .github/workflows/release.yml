name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.4.0). If empty, uses package.json version."
        required: false
        type: string
      dry_run:
        description: "Build and validate artifacts without publishing."
        required: false
        default: true
        type: boolean
      signed:
        description: "Enable code signing (requires CSC_LINK + CSC_KEY_PASSWORD or Azure secrets)."
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache Python dependencies
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: pip install -r backend/requirements.txt pyinstaller
        shell: powershell

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache Node.js dependencies (frontend)
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-frontend-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-frontend-

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend
        shell: powershell

      - name: Cache Node.js dependencies (desktop)
        uses: actions/cache@v4
        with:
          path: desktop/node_modules
          key: ${{ runner.os }}-desktop-${{ hashFiles('desktop/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-desktop-

      - name: Install desktop dependencies
        run: npm ci
        working-directory: desktop
        shell: powershell

      - name: Run backend tests
        run: python -m pytest tests/ -q
        working-directory: backend
        shell: powershell

      - name: Run backend validation
        run: python scripts/validate_backend.py
        working-directory: backend
        shell: powershell

      - name: Build backend executable
        run: python scripts/build_backend_exe.py
        working-directory: backend
        shell: powershell
        timeout-minutes: 30

      - name: Smoke test backend executable
        run: python scripts/smoke_backend_exe.py
        working-directory: backend
        shell: powershell

      - name: Run frontend typecheck
        run: npx tsc --noEmit
        working-directory: frontend
        shell: powershell

      - name: Run frontend build
        run: npx vite build
        working-directory: frontend
        shell: powershell

      - name: Run desktop syntax check
        run: node --check main.js && node --check preload.js
        working-directory: desktop
        shell: powershell

      - name: Check signing config
        run: node scripts/check_signing_config.js
        working-directory: desktop
        shell: powershell
        env:
          CSC_LINK: ${{ secrets.CSC_LINK || '' }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD || '' }}
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK || '' }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD || '' }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID || '' }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID || '' }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET || '' }}
          AZURE_TRUSTED_SIGNING_ACCOUNT_NAME: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME || '' }}
          AZURE_TRUSTED_SIGNING_CERT_PROFILE_NAME: ${{ secrets.AZURE_TRUSTED_SIGNING_CERT_PROFILE_NAME || '' }}
          AZURE_TRUSTED_SIGNING_ENDPOINT: ${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT || '' }}
          FORCE_CODE_SIGNING: ${{ inputs.signed && 'true' || 'false' }}

      - name: Build desktop package (unsigned)
        if: ${{ !inputs.signed }}
        run: npm run build
        working-directory: desktop
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_MODE: unsigned-release

      - name: Build desktop package (signed)
        if: ${{ inputs.signed }}
        run: npm run build
        working-directory: desktop
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_MODE: signed-release
          FORCE_CODE_SIGNING: "true"
          CSC_LINK: ${{ secrets.CSC_LINK || '' }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD || '' }}
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK || '' }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD || '' }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID || '' }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID || '' }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET || '' }}
          AZURE_TRUSTED_SIGNING_ACCOUNT_NAME: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME || '' }}
          AZURE_TRUSTED_SIGNING_CERT_PROFILE_NAME: ${{ secrets.AZURE_TRUSTED_SIGNING_CERT_PROFILE_NAME || '' }}
          AZURE_TRUSTED_SIGNING_ENDPOINT: ${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT || '' }}

      - name: Run release artifact validation
        run: node scripts/validate_release_artifacts.js
        working-directory: desktop
        shell: powershell
        env:
          FORCE_CODE_SIGNING: ${{ inputs.signed && 'true' || 'false' }}
          CSC_LINK: ${{ secrets.CSC_LINK || '' }}
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK || '' }}

      - name: Verify Windows signatures
        if: ${{ inputs.signed }}
        run: node scripts/verify_windows_signature.js
        working-directory: desktop
        shell: powershell
        env:
          REQUIRE_SIGNED_ARTIFACTS: "true"

      - name: Run packaged smoke test
        run: node scripts/smoke_packaged_app.js
        working-directory: desktop
        shell: powershell

      - name: Upload release artifacts
        if: ${{ !inputs.dry_run }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version || '0.3.0' }}
          draft: true
          files: |
            release/KeoThongMinh-Portable-*.exe
            release/KeoThongMinh-Setup-*.exe
            release/win-unpacked/resources/backend/keobot_backend/keobot_backend.exe
            release/latest.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List release directory
        if: ${{ always() }}
        run: Get-ChildItem -LiteralPath release -Name
        working-directory: ./
        shell: powershell
